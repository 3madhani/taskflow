name: taskflow
description: TaskFlow — A production-quality Task Manager app built with Clean Architecture, BLoC, Hive, and GoRouter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.1

  # Backend — Supabase (auth + REST API + JWT auto-managed)
  supabase_flutter: ^2.3.0

  # Local Storage (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  image_picker: ^1.1.2

  # Utilities
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  injectable_generator: ^2.6.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/icons/taskflow_icon.png
    - assets/icons/taskflow_splash.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/taskflow_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/taskflow_icon.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0F0F1A"
  image: assets/icons/taskflow_splash.png
  image_dark: assets/icons/taskflow_splash.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#FFFFFF"
    color_dark: "#0F0F1A"
    image: assets/icons/taskflow_splash.png
    image_dark: assets/icons/taskflow_splash.png
