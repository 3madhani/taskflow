name: Android APK Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  build-android:
    name: Build split APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build split release APKs
        run: flutter build apk --release --split-per-abi --no-pub

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taskflow-split-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error

      - name: Attach APKs to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*-release.apk
